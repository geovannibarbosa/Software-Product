x-airflow-common: &airflow-common
  build:
    context: ./airflow
  image: ecommerce-airflow:2.8.4-python3.10
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: "6G163GPLBa6oafHIEP3j6mc-1tnWc4A4yXBTUL3yaJY="
    AIRFLOW__WEBSERVER__SECRET_KEY: "6G163GPLBa6oafHIEP3j6mc-1tnWc4A4yXBTUL3yaJY="
  user: "50000:0"
  volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - ./airflow/dags:/opt/airflow/dags
    - ./jobs:/opt/airflow/jobs
    - ./lakehouse:/opt/airflow/lakehouse
    - ./data_input:/opt/airflow/data_input

services:
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --role Admin
      --email admin@example.com || true"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
    command: scheduler

  spark-master:
    image: apache/spark:3.5.1
    container_name: spark-master
    hostname: spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_MASTER_PORT: 7077
    ports:
      - "7077:7077"
      - "8081:8080"
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./lakehouse:/opt/spark/lakehouse
      - ./data_input:/opt/spark/data_input
      - ./tests:/opt/spark/tests
      - ./spark:/opt/spark/spark
      - ./exports:/opt/spark/exports

  spark-worker:
    image: apache/spark:3.5.1
    container_name: spark-worker
    hostname: spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    environment:
      SPARK_WORKER_CORES: 2
      SPARK_WORKER_MEMORY: 2g
    volumes:
      - ./jobs:/opt/spark/jobs
      - ./lakehouse:/opt/spark/lakehouse
      - ./data_input:/opt/spark/data_input
      - ./tests:/opt/spark/tests
      - ./spark:/opt/spark/spark
      - ./exports:/opt/spark/exports

volumes:
  postgres_data:
